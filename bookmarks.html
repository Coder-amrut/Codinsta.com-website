<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmarks | CodInsta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="assets/js/db.js"></script>
    <style>
        .bookmarks-header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 40px;
            border-radius: 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 50px;
            margin-bottom: 40px;
        }

        .btn-remove-bookmark {
            background: none;
            border: none;
            color: var(--danger);
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-remove-bookmark:hover {
            transform: scale(1.1);
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <i class="fas fa-code"></i>
            CodInsta<span>.com</span>
        </div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="challenges.html">Challenges</a>
            <a href="leaderboard.html">Leaderboard</a>
            <a href="groups.html">Groups</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="profile.html">Profile</a>
        </nav>
        <div class="auth-btns">
            <a href="profile.html" class="btn-login"><i class="fas fa-arrow-left"></i> Back</a>
        </div>
    </header>

    <div class="container">
        <div class="bookmarks-header">
            <div>
                <h1 style="font-size: 2.5rem; font-weight: 800; margin-bottom: 5px;"><i class="fas fa-bookmark" style="color: #FFD700;"></i> Bookmarked Questions</h1>
                <p style="font-size: 1.1rem; font-weight: 500; opacity: 0.9;">Review and solve questions you saved for later.</p>
            </div>
        </div>

        <div class="challenges-grid" id="main-bookmarks-grid">
            <!-- Dynamically populated -->
        </div>

    </div>

    <!-- Reusing Pseudo Modal -->
    <div class="modal-overlay" id="pseudo-modal">
        <div class="modal">
            <h2 id="pseudo-title">Solve Pseudo Logic</h2>
            <div style="font-size: 1.5rem; font-weight: 700; color: var(--danger); margin: 15px 0;">Time Left: <span id="pseudo-timer">00:00</span></div>
            <textarea id="pseudo-text" placeholder="Write down your pseudo code logic here... Think about time and space complexity." style="display:block; width: 100%; height: 200px; padding: 15px; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 20px; font-family: monospace;"></textarea>
            <div class="modal-footer" style="display: flex; justify-content: flex-end; gap: 10px;">
                <button class="btn-cancel" onclick="closePseudoModal()" style="padding: 10px 20px; background: #f1f5f9; border-radius: 8px; border: none; cursor: pointer;">Give Up</button>
                <button class="btn-submit-pseudo" onclick="submitPseudo()" style="padding: 10px 20px; background: var(--primary); color: white; border-radius: 8px; border: none; cursor: pointer; font-weight: 700;">Submit Logic</button>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        let pseudoTimer;
        let timeLeft = 0;
        let activeQuestionId = null;

        function renderBookmarks() {
            const bookmarks = JSON.parse(localStorage.getItem('codinsta_bookmarks')) || [];
            const customQs = JSON.parse(localStorage.getItem('codinsta_custom_qs')) || [];
            
            // Combine with default featured questions from db.js (assuming it's loaded in window)
            const allChallenges = [...customQs, ...(window.featuredQuestions || [])];
            const bookmarkedChallenges = allChallenges.filter(q => bookmarks.includes(q.id));

            const grid = document.getElementById('main-bookmarks-grid');
            grid.innerHTML = '';

            if (bookmarkedChallenges.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 50px; color: var(--text-muted);">
                    <i class="far fa-bookmark" style="font-size: 3rem; margin-bottom: 20px; display: block;"></i>
                    <p>You haven't bookmarked any questions yet.</p>
                </div>`;
                return;
            }

            bookmarkedChallenges.forEach(q => {
                const cardHtml = `
                    <div class="card challenge-card" id="card-${q.id}" style="position: relative;">
                        <div class="card-actions">
                            <button class="btn-remove-bookmark" title="Remove Bookmark" onclick="toggleBookmark('${q.id}')">
                                <i class="fas fa-bookmark"></i>
                            </button>
                        </div>
                        <div class="difficulty" style="display: flex; align-items: center; justify-content: space-between;">
                            <span class="badge badge-${q.diff}">${q.diff.charAt(0).toUpperCase() + q.diff.slice(1)}</span>
                            <span id="status-${q.id}"></span>
                        </div>
                        <div class="card-meta">
                            <div class="author-info">
                                <img src="https://i.pravatar.cc/100?u=${q.author}" alt="${q.author}">
                                <span>${q.author}${q.isPremium ? ' <i class="fas fa-crown" style="color: #FFD700; margin-left: 4px;" title="Premium Member"></i>' : ''}</span>
                            </div>
                            <div class="solved-count">
                                <i class="fas fa-users"></i> <span>${q.solvedCount || 0}</span> Solved
                            </div>
                        </div>
                        <h3>${q.title}</h3>
                        <p>${q.bio}</p>
                        <div class="card-footer">
                            <div class="languages">
                                ${q.languages.map(l => `<span class="lang-icon">${l}</span>`).join('')}
                            </div>
                            <button class="btn-solve" onclick="openPseudoModal('${q.title.replace(/'/g, "\\'")}', '${q.time}', '${q.id}')">Solve</button>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', cardHtml);
            });

            // Mark solved ones
            const solved = JSON.parse(localStorage.getItem('codinsta_solved')) || [];
            solved.forEach(id => {
                const card = document.getElementById('card-' + id);
                if (card) {
                    card.classList.add('solved');
                    const status = document.getElementById('status-' + id);
                    if(status) status.innerHTML = `<span class="solved-badge"><i class="fas fa-check-circle"></i> SOLVED</span>`;
                    const btn = card.querySelector('.btn-solve');
                    if(btn) btn.textContent = "Solved ✓";
                }
            });
        }

        window.toggleBookmark = function(id) {
            let bookmarks = JSON.parse(localStorage.getItem('codinsta_bookmarks')) || [];
            if (bookmarks.includes(id)) {
                bookmarks = bookmarks.filter(bId => bId !== id);
                showToast('Removed from Bookmarks');
            } else {
                bookmarks.push(id);
                showToast('Added to Bookmarks');
            }
            localStorage.setItem('codinsta_bookmarks', JSON.stringify(bookmarks));
            renderBookmarks();
        }

        // --- Modals logic
        function openPseudoModal(title, time, id) {
            activeQuestionId = id;
            document.getElementById('pseudo-title').textContent = title;
            document.getElementById('pseudo-modal').style.display = 'flex';
            document.getElementById('pseudo-text').value = '';

            const parts = time.split(':').map(Number);
            timeLeft = parts[0] * 60 + (parts[1] || 0);
            updateTimerDisplay();

            clearInterval(pseudoTimer);
            pseudoTimer = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    clearInterval(pseudoTimer);
                    alert("Time is up!");
                    closePseudoModal();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            const timerEl = document.getElementById('pseudo-timer');
            if (timerEl) timerEl.textContent = `${m}:${s}`;
        }

        function closePseudoModal() {
            document.getElementById('pseudo-modal').style.display = 'none';
            clearInterval(pseudoTimer);
        }

        function submitPseudo() {
            const logic = document.getElementById('pseudo-text').value.trim();
            if (logic.length < 20) {
                alert("Please write more detailed logic!");
                return;
            }

            clearInterval(pseudoTimer);
            alert("Logic Submitted! Our moderators will review it.");
            closePseudoModal();

            const solved = JSON.parse(localStorage.getItem('codinsta_solved')) || [];
            if (!solved.includes(activeQuestionId)) {
                solved.push(activeQuestionId);
                localStorage.setItem('codinsta_solved', JSON.stringify(solved));
            }

            renderBookmarks();
            showToast('+5 Points Awarded!', 'success');
        }

        document.addEventListener('DOMContentLoaded', renderBookmarks);
    </script>
</body>
</html>
